name: Coverage Audit

# Audita a cobertura dos blocos nativos VTEX contra o store/interfaces.json
# de cada app (ground-truth). Roda semanalmente, sob demanda, e quando os
# dados/script de cobertura mudam.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # toda segunda-feira, 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'data/blocks.json'
      - 'schemas/vtex-blocks.schema.json'
      - 'scripts/check-coverage.js'

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar auditoria de cobertura
        run: node scripts/check-coverage.js

      - name: Publicar relatório no resumo do run
        run: cat docs/coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload do relatório (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            docs/coverage-report.md
            data/coverage.json

      - name: Abrir/atualizar issue se houver gap novo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(node -e "console.log((require('./data/coverage.json').newGaps||[]).length)")
          if [ "$COUNT" -gt 0 ]; then
            LIST=$(node -e "console.log((require('./data/coverage.json').newGaps||[]).map(x=>'- \`'+x+'\`').join('\n'))")
            BODY=$(printf 'A auditoria de cobertura detectou **%s** bloco(s) nativo(s) novo(s) sem cobertura:\n\n%s\n\nVeja `docs/coverage-report.md` (artifact do run). \n\nPara **fechar o gap**: rode a extração de props e regenere o schema. \nPara **aceitar** (não cobrir): adicione o ID em `data/coverage-accepted.json`.' "$COUNT" "$LIST")
            gh label create coverage-gap --color F71963 --description "Novo bloco nativo VTEX sem cobertura" --force || true
            EXIST=$(gh issue list --label coverage-gap --state open --json number --jq '.[0].number')
            if [ -n "$EXIST" ]; then
              gh issue comment "$EXIST" --body "$BODY"
              echo "Comentado na issue #$EXIST"
            else
              gh issue create --title "Cobertura: $COUNT novo(s) bloco(s) nativo(s) sem cobertura" --label coverage-gap --body "$BODY"
            fi
          else
            echo "Nenhum gap novo. Fechando issue aberta, se houver."
            EXIST=$(gh issue list --label coverage-gap --state open --json number --jq '.[0].number')
            if [ -n "$EXIST" ]; then gh issue close "$EXIST" --comment "Sem gaps novos na última auditoria — fechando automaticamente."; fi
          fi

      - name: Commitar relatório atualizado (se mudou)
        run: |
          if [[ -n "$(git status --porcelain docs/coverage-report.md data/coverage.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/coverage-report.md data/coverage.json
            git commit -m "chore: atualiza relatório de cobertura [skip ci]"
            git push
          else
            echo "Relatório de cobertura sem alterações."
          fi
